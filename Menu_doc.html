<!-- 
  Tên file: Menu_doc.html
  Chức năng: Thanh điều hướng dọc (Sidebar) cho hệ thống Kiểm tra nội bộ
  Tác giả: Hoàng Ngọc Lâm
-->
<style>
  .sidebar-menu { 
      width: 260px; 
      background: #1e3a8a; /* Đã cập nhật nền xanh đặc trưng */
      border-right: 1px solid #172554; 
      height: 100vh; 
      position: sticky; 
      top: 0; 
      display: flex; 
      flex-direction: column; 
      box-shadow: 2px 0 10px rgba(0,0,0,0.1);
      font-family: "Times New Roman", serif;
      z-index: 1000;
  }
  .sidebar-header {
      padding: 25px 15px;
      text-align: center;
      border-bottom: 2px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 15px;
  }
  .sidebar-logo {
      width: 65px;
      height: 65px;
      object-fit: contain;
      margin-bottom: 12px;
      background: #ffffff; /* Nền trắng để làm nổi bật logo trên nền xanh */
      border-radius: 50%;
      padding: 3px;
  }
  .sidebar-title {
      color: #ffeb3b; /* Đổi màu chữ vàng để tương phản nền xanh */
      font-weight: bold;
      font-size: 15px;
      text-transform: uppercase;
      margin: 0;
      line-height: 1.3;
  }
  .sidebar-subtitle {
      color: #ffffff; /* Đổi màu chữ trắng */
      font-size: 13px;
      font-weight: bold;
      margin-top: 5px;
      letter-spacing: 0.5px;
  }
  .menu-list {
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
  }
  .menu-btn { 
      padding: 12px 15px; 
      background: transparent; 
      border: 1px solid transparent; 
      text-align: left; 
      font-weight: bold; 
      color: #e2e8f0; /* Chữ trắng xám */
      border-radius: 8px; 
      cursor: pointer; 
      transition: all 0.2s ease; 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      font-size: 14px;
      text-transform: uppercase;
  }
  .menu-btn i { font-size: 18px; width: 20px; text-align: center; }
  .menu-btn:hover { 
      background: rgba(255, 255, 255, 0.1); 
      color: #ffffff; 
  }
  .menu-btn.active { 
      background: #ffffff; 
      color: #1e3a8a; 
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }
  
  .menu-bottom-section {
      margin-top: auto; 
      padding: 0 12px; 
      display: flex; 
      flex-direction: column; 
      gap: 10px; 
      margin-bottom: 10px;
  }
  
  .menu-logout { 
      margin-bottom: 25px;
      margin-left: 12px;
      margin-right: 12px;
      color: #ffffff; 
      background: #dc2626; 
      border: 1px solid #b91c1c;
      justify-content: center;
      text-transform: uppercase;
  }
  .menu-logout:hover { 
      background: #b91c1c; 
      color: #ffffff;
  }
  
  /* Ghi đè CSS riêng cho nút AI trong Sidebar */
  .btn-ai-sidebar {
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: white; border: none; padding: 10px; border-radius: 8px;
      font-weight: bold; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s;
  }
  .btn-ai-sidebar:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
</style>

<div class="sidebar-menu">
  <div class="sidebar-header">
    <img src="https://i.ibb.co/8Df1xXsN/Logo-nguyen-du.png" class="sidebar-logo" alt="Logo">
    <h3 class="sidebar-title">SỔ KIỂM TRA NỘI BỘ</h3>
    <div class="sidebar-subtitle">TRƯỜNG TIỂU HỌC NGUYỄN DU</div>
  </div>
  
  <div class="menu-list">
      <button class="menu-btn active" onclick="chuyentth('TabNhapLieu', this)">
          <i class="bi bi-pencil-square"></i> GHI SỔ KIỂM TRA
      </button>
      <button class="menu-btn" onclick="chuyentth('TabTimKiem', this)">
          <i class="bi bi-search"></i> THỐNG KÊ - TRA CỨU
      </button>
      <button class="menu-btn" onclick="chuyentth('TabHuongDan', this)">
          <i class="bi bi-info-circle"></i> HƯỚNG DẪN SỬ DỤNG
      </button>
  </div>

  <div class="menu-bottom-section">
      <button class="btn-ai-sidebar w-100" onclick="toggleAIChat()">
          <i class="bi bi-robot"></i> Trợ Giúp Hướng Dẫn
      </button>
      
      <div class="dev-badge-container w-100 justify-content-center" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 5px; box-shadow: none;">
        <div class="dev-icon-fly" style="margin-right: 8px; font-size: 14px;">🚀</div>
        <div class="dev-text-group" style="text-align: left;">
          <div class="dev-name-label" style="font-size: 10px; color: #ffeb3b;">HOÀNG NGỌC LÂM</div>
          <div class="dev-role-label" style="font-size: 9px; color: #ffffff;">System Developer</div>
        </div>
      </div>
  </div>

  <button class="menu-btn menu-logout" onclick="dangxg()">
      <i class="bi bi-door-open"></i> ĐĂNG XUẤT
  </button>
</div>
