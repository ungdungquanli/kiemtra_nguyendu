<style>
  #upload_modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10005; justify-content: center; align-items: center; }
  .up-container { background: white; padding: 20px; border-radius: 12px; width: 600px; max-width: 95%; box-shadow: 0 5px 20px rgba(0,0,0,0.3); font-family: "Times New Roman"; }
  .up-header { text-align: center; border-bottom: 2px solid #1e3a8a; margin-bottom: 15px; padding-bottom: 5px; }
  .up-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
  .up-dropzone { border: 2px dashed #3b82f6; padding: 25px; text-align: center; background: white; border-radius: 8px; cursor: pointer; transition: 0.2s; }
  .up-dropzone:hover { background: #eff6ff; }
  #uploadBtn { width: 100%; padding: 12px; background: #059669; color: white; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; opacity: 0.5; pointer-events: none; margin-top: 10px; }
  #uploadBtn.active { opacity: 1; pointer-events: auto; }
  .close-up { background: #ef4444; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; float: right; }
  #warnDelete { display:none; color:#d97706; font-size:13px; text-align:center; margin-bottom:5px; font-weight:bold; background: #fffbeb; padding: 5px; border-radius: 4px; border: 1px dashed #d97706; }
</style>

<div id="upload_modal">
  <div class="up-container">
    <div class="up-header"><h2 style="margin:0; color:#1e3a8a;">📁 MINH CHỨNG</h2></div>
    
    <div class="up-box">
      <label><b>1. Chọn thư mục lưu trữ (Tiêu chuẩn):</b></label>
      <select id="folderSelect" style="width:100%; padding:8px; margin-top:5px; border:1px solid #ccc; border-radius:4px;">
        <option>⏳ Đang quét...</option>
      </select>
    </div>

    <div class="up-box">
      <label style="display:block; margin-bottom:5px;"><b>2. Chọn chế độ và phương thức tải:</b></label>
      
      <div style="display:flex; gap:20px; justify-content:center; margin-bottom:10px; font-weight:bold;">
        <label><input type="radio" name="upMode" value="file" checked onchange="chuyencdta()"> 📄 Chọn nhiều File lẻ</label>
        <label><input type="radio" name="upMode" value="folder" onchange="chuyencdtm()"> 📂 Cả thư mục</label>
      </div>
      
      <div style="display:flex; gap:20px; justify-content:center; padding:8px; background:#e0f2fe; border-radius:6px; margin-bottom:10px; font-size: 14px;">
        <label style="color:#0369a1; cursor:pointer;" title="Xóa tài liệu cũ trên hệ thống, thay bằng tài liệu mới">
          <input type="radio" name="writeMode" value="replace" checked onchange="capnhtcb()"> 🔄 Thay thế tài liệu cũ
        </label>
        <label style="color:#0369a1; cursor:pointer;" title="Giữ nguyên tài liệu cũ, chèn thêm tài liệu mới vào hệ thống">
          <input type="radio" name="writeMode" value="append" onchange="capnhtcb()"> ➕ Chèn thêm tài liệu
        </label>
      </div>
      
      <div class="up-dropzone" onclick="document.getElementById('fileIn').click()">
        <span id="fileLabel">Nhấn vào đây để chọn file</span>
        <input type="file" id="fileIn" style="display:none" onchange="chonte(this)" multiple>
      </div>
    </div>

    <div id="warnDelete">⚠️ Tài liệu cũ (File/Thư mục) trên Drive sẽ bị xóa vĩnh viễn để thay thế bằng tài liệu mới.</div>

    <div id="upStatus" style="text-align:center; font-weight:bold; min-height:20px; color:#333;"></div>
    
    <div style="margin-top:10px;">
      <button id="uploadBtn" onclick="thuchta()">BẮT ĐẦU TẢI LÊN</button>
      <button class="close-up" onclick="donghopthta()">ĐÓNG</button>
      <div style="clear:both"></div>
    </div>
  </div>
</div>

<script>
  let tepht = [];
  let lkcx = ""; 
  const idgo = '14xzYmCg2hNPJYD_W0M3YaeJALv2L4w_t';

  function taithu() {
    const hop = document.getElementById('folderSelect');
    google.script.run.withSuccessHandler(tm => {
      hop.innerHTML = `<option value="${idgo}">-- Thư mục gốc --</option>`;
      if(tm) tm.forEach(t1 => hop.add(new Option("📂 " + t1.tenn, t1.idt)));
    }).skt_laytm_con();
  }

  function mohopthta(lkht) {
    const hpnkt = document.getElementById('cbNguoiKiemTra');
    if (hpnkt) {
      const gtri = hpnkt.value;
      if (!gtri) return typeof hienhth === 'function' ? hienhth("⚠️ Chọn Người kiểm tra trước!") : alert("⚠️ Chọn Người kiểm tra trước!");
    }
    
    lkcx = lkht || "";
    capnhtcb();
    document.getElementById('upload_modal').style.display = 'flex';
  }

  function capnhtcb() {
    const cdg = document.querySelector('input[name="writeMode"]:checked').value;
    const vungcb = document.getElementById('warnDelete');
    
    if(cdg === 'replace' && lkcx && lkcx.trim() !== "") {
        vungcb.style.display = 'block';
    } else {
        vungcb.style.display = 'none';
    }
  }

  function donghopthta() {
    document.getElementById('upload_modal').style.display = 'none';
    document.getElementById('upStatus').innerText = "";
    document.getElementById('fileIn').value = "";
    document.getElementById('fileLabel').innerText = "Nhấn để chọn file";
    document.getElementById('warnDelete').style.display = 'none';
    tepht = []; 
    lkcx = "";
    document.getElementById('uploadBtn').classList.remove('active');
  }

  function chuyencdta() {
    const dh = document.getElementById('fileIn');
    dh.removeAttribute('webkitdirectory'); dh.removeAttribute('directory'); 
    dh.setAttribute('multiple', 'multiple'); 
    datlnhte();
  }

  function chuyencdtm() {
    const dh = document.getElementById('fileIn');
    dh.setAttribute('webkitdirectory', ''); dh.setAttribute('directory', ''); dh.setAttribute('multiple', 'multiple');
    datlnhte();
  }

  function datlnhte() {
    document.getElementById('fileIn').value = "";
    document.getElementById('fileLabel').innerText = "Nhấn vào đây để chọn file";
    document.getElementById('uploadBtn').classList.remove('active');
    tepht = [];
  }

  function chonte(dauv) {
    if (dauv.files.length > 0) {
      tepht = dauv.files;
      const cd = document.querySelector('input[name="upMode"]:checked').value;
      if (cd === 'folder') {
        const tent = tepht[0].webkitRelativePath.split('/')[0];
        document.getElementById('fileLabel').innerText = `📂 ${tent} (${tepht.length} files)`;
      } else {
        if (tepht.length === 1) {
            document.getElementById('fileLabel').innerText = "📄 " + tepht[0].name;
        } else {
            document.getElementById('fileLabel').innerText = `📄 Đã chọn ${tepht.length} file`;
        }
      }
      document.getElementById('uploadBtn').classList.add('active');
      document.getElementById('upStatus').innerText = "Sẵn sàng.";
    }
  }

  function thuchta() {
    if (!tepht || tepht.length === 0) return;
    const nt = document.getElementById('uploadBtn'), tt = document.getElementById('upStatus');
    const idt = document.getElementById('folderSelect').value || idgo;
    const cd = document.querySelector('input[name="upMode"]:checked').value;
    const cdg = document.querySelector('input[name="writeMode"]:checked').value;
    
    let mhs = "";
    if (typeof donghtta !== 'undefined' && donghtta) {
        const omh = donghtta.querySelector('.ma-ho-so-cell');
        if (omh) mhs = omh.innerText;
    } else {
        const om = document.querySelector('.ma-ho-so-cell');
        mhs = om ? om.innerText : "";
    }

    if (!mhs || mhs.trim() === "") {
        tt.style.color = "red";
        tt.innerText = "❌ Lỗi: Không tìm thấy Mã hồ sơ để gắn minh chứng!";
        nt.classList.add('active');
        return;
    }

    nt.classList.remove('active');
    tt.style.color = "blue"; tt.innerText = "⏳ Đang xử lý tải lên...";

    if (cd === 'file') {
      let dlte = [];
      let dem = 0;
      tt.innerText = `⏳ Đang đọc ${tepht.length} file...`;
      
      Array.from(tepht).forEach(te => {
        const do1 = new FileReader();
        do1.onload = err => {
          dlte.push({ tetpt: te.name, kieut: te.type, dlgio: err.target.result.split(',')[1] });
          dem++;
          
          if (dem === tepht.length) {
            tt.innerText = `⏳ Đang gửi ${tepht.length} file lên Drive...`;
            
            google.script.run
            .withSuccessHandler(kq => {
                xulykqta(kq, tt, nt);
            })
            .withFailureHandler(lo => {
                tt.style.color = "red"; 
                tt.innerText = "❌ Lỗi mạng hoặc Server: " + lo.message;
                nt.classList.add('active');
            })
            .skt_tainhiu_tep(dlte, mhs, idt, lkcx, cdg); 
          }
        };
        do1.readAsDataURL(te);
      });
    } else {
      const tent = tepht[0].webkitRelativePath.split('/')[0];
      let dlte = [];
      let dem = 0;
      tt.innerText = `⏳ Đang đọc ${tepht.length} file...`;
      
      Array.from(tepht).forEach(te => {
        const do1 = new FileReader();
        do1.onload = err => {
          dlte.push({ tetpt: te.name, kieut: te.type, dlgio: err.target.result.split(',')[1] });
          dem++;
          
          if (dem === tepht.length) {
            tt.innerText = "⏳ Đang gửi dữ liệu lên Drive...";
            
            google.script.run
            .withSuccessHandler(kq => {
                xulykqta(kq, tt, nt);
            })
            .withFailureHandler(lo => {
                tt.style.color = "red"; 
                tt.innerText = "❌ Lỗi mạng hoặc Server: " + lo.message;
                nt.classList.add('active');
            })
            .skt_taitm_minhc(idt, tent, dlte, lkcx, cdg); 
          }
        };
        do1.readAsDataURL(te);
      });
    }
  }

  function xulykqta(kq, tt, nt) {
    if (kq.tcon) {
      tt.style.color = "green"; tt.innerText = "✅ " + kq.tbao;
      if(typeof trallkch === 'function') {
          trallkch(kq.lkpt); 
      }
      setTimeout(donghopthta, 1000); 
    } else {
      tt.style.color = "red"; tt.innerText = "❌ " + kq.tbao;
      nt.classList.add('active');
    }
  }
</script>
